version: "3.9"

services:

# Database:  
  postgres:
    image: postgres:16
    container_name: oaxaca-postgres
    environment:
      POSTGRES_DB: oaxaca
      POSTGRES_USER: oaxaca
      POSTGRES_PASSWORD: oaxaca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

# Backend: 
  backend:
    image: maven:3.9.6-eclipse-temurin-17
    container_name: spring-backend
    working_dir: /app
    volumes:
      - ./Backend:/app
      - maven-repo:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/oaxaca
      - SPRING_DATASOURCE_USERNAME=oaxaca
      - SPRING_DATASOURCE_PASSWORD=oaxaca

# Frontend:
  frontend:
    image: node:20-alpine
    container_name: react-frontend
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

# Persist data across containers
volumes:
  postgres-data:
  maven-repo:
  node-modules:
