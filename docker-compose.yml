version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: oaxaca-postgres
    environment:
      POSTGRES_DB: oaxaca
      POSTGRES_USER: oaxaca
      POSTGRES_PASSWORD: oaxaca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
