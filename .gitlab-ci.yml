image: eclipse-temurin:17

stages:
  - build
  - test
  - jacoco
  - checkstyle
  - spotbugs
  - frontend

cache:
  paths:
    - .m2/repository

build:
  stage: build
  script:
    - cd Backend
    - mvn clean compile

test:
  stage: test
  script:
    - cd Backend
    - mvn test

jacoco:
  stage: jacoco
  script:
    - cd Backend
    - mvn verify
  artifacts:
    paths:
      - Backend/target/site/jacoco
    expire_in: 1 week

checkstyle:
  stage: checkstyle
  script:
    - cd Backend
    - mvn checkstyle:check
  allow_failure: true

spotbugs:
  stage: spotbugs
  script:
    - cd Backend
    - mvn spotbugs:check
  allow_failure: true

frontend:
  stage: frontend
  image: node:20
  variables:
    VITE_API_URL: "http://localhost:8080"
  cache:
    paths:
      - Frontend/node_modules
  script:
    - cd Frontend
    - npm ci
    - npm run dev -- --host 0.0.0.0 &  # start dev server
    - sleep 10                           # wait for server to start
    - curl --fail http://localhost:5173  # check it responds
