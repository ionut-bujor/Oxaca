spring.application.name=demo

# ===============================
# DB CONFIG
# ===============================

# --- This is used for Postgres running in Docker (default for team) ---
# spring.datasource.url=jdbc:postgresql://postgres:5432/oaxaca

# --- Use this when running Postgres locally (incase of issues and comment the other one out) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/oaxaca

spring.datasource.username=oaxaca
spring.datasource.password=oaxaca
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

